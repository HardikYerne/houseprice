<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        #result {
            margin-top: 20px;
            text-align: center;
        }

        #status {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .ok { background: green; }
        .fail { background: red; }
    </style>
</head>

<body>

<div id="status" class="fail">Connecting...</div>

<div class="container">
    <h2>🏠 House Price Predictor</h2>

    <form id="form">
        {% for name, info in feature_info.items() %}
            <label>{{ name }}</label>
            <input type="number" step="any" name="{{ name }}" value="{{ info.default }}" required>
        {% endfor %}

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>

<script>
const API = window.location.origin;

// Check backend connection
async function checkHealth() {
    try {
        const res = await fetch(API + "/api/health");
        if (res.ok) {
            document.getElementById("status").innerText = "Connected";
            document.getElementById("status").className = "ok";
        }
    } catch {
        document.getElementById("status").innerText = "Disconnected";
        document.getElementById("status").className = "fail";
    }
}

checkHealth();

// Predict
document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    let formData = new FormData(e.target);
    let data = {};

    formData.forEach((value, key) => {
        data[key] = parseFloat(value);
    });

    document.getElementById("result").innerText = "Predicting...";

    try {
        let res = await fetch(API + "/api/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        let result = await res.json();

        if (result.success) {
            document.getElementById("result").innerText =
                "💰 " + result.prediction_usd +
                " | Confidence: " + result.confidence + "%";
        } else {
            document.getElementById("result").innerText =
                "❌ " + result.error;
        }

    } catch (err) {
        document.getElementById("result").innerText = "Server Error";
    }
});
</script>

</body>
</html>
